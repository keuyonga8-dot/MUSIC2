<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beat Dodge — 패턴 에디터</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0a0a0f;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
#wrap{display:flex;height:100vh;gap:0;}

/* 왼쪽: 설정 패널 */
#panel{width:280px;flex:0 0 280px;background:#0d0d18;border-right:1px solid #1a1a2e;display:flex;flex-direction:column;overflow-y:auto;}
#panel-header{padding:12px 14px;border-bottom:1px solid #1a1a2e;}
#panel-header h1{font-size:13px;font-weight:600;color:#AFA9EC;margin-bottom:2px;}
#panel-header p{font-size:10px;color:#444;}
.section{padding:12px 14px;border-bottom:1px solid #1a1a2e;}
.section-title{font-size:10px;color:#444;margin-bottom:8px;letter-spacing:.05em;}
.field{display:flex;flex-direction:column;gap:3px;margin-bottom:8px;}
.field label{font-size:10px;color:#666;}
.inp{font-size:12px;padding:6px 8px;background:#111;border:1px solid #222;border-radius:6px;color:#fff;outline:none;width:100%;}
.inp:focus{border-color:#534AB7;}
.row{display:flex;gap:6px;}
.btn{font-size:11px;padding:6px 12px;border:none;border-radius:6px;cursor:pointer;font-weight:500;width:100%;margin-bottom:4px;}
.btn-primary{background:#534AB7;color:#fff;}
.btn-green{background:#1D9E75;color:#fff;}
.btn-gray{background:#1a1a2e;color:#888;border:1px solid #333;}
.btn-red{background:rgba(226,75,74,.2);color:#E24B4A;border:1px solid #E24B4A;}

/* 도구 */
.tool-btn{flex:1;padding:7px;font-size:11px;font-weight:600;border-radius:6px;cursor:pointer;text-align:center;border:1px solid #333;background:#111;color:#666;}
.tool-btn.active-bad{border-color:#E24B4A;background:rgba(226,75,74,.2);color:#E24B4A;}
.tool-btn.active-good{border-color:#1D9E75;background:rgba(29,158,117,.2);color:#1D9E75;}
.tool-btn.active-erase{border-color:#888;background:rgba(255,255,255,.08);color:#ccc;}

/* 출력 코드 */
#output-code{font-family:monospace;font-size:10px;color:#AFA9EC;background:#080810;padding:8px;border-radius:6px;white-space:pre;overflow:auto;max-height:180px;border:1px solid #1a1a2e;margin-bottom:6px;}

/* 오른쪽: 게임 뷰 + 에디터 */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
#yt-area{background:#000;flex:0 0 auto;}
#yt-area iframe{width:100%;height:180px;border:none;display:block;}
#yt-placeholder{height:180px;display:flex;align-items:center;justify-content:center;color:#333;font-size:13px;background:#000;}

/* 게임형 에디터 */
#game-editor{flex:1;display:flex;overflow:hidden;position:relative;}
#lanes{display:flex;flex:1;gap:2px;padding:8px;background:#0a0a0f;overflow-y:auto;}
.lane{flex:1;display:flex;flex-direction:column;gap:2px;min-width:60px;}
.lane-header{text-align:center;font-size:11px;color:#555;padding:4px;background:#111;border-radius:4px;margin-bottom:4px;position:sticky;top:0;z-index:10;}
.beat-cell{width:100%;height:28px;border-radius:4px;background:#111;border:1px solid #1a1a2e;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;color:#333;transition:background .08s;position:relative;flex:0 0 auto;}
.beat-cell:hover{background:#1a1a2e;color:#555;}
.beat-cell.bad{background:rgba(226,75,74,.35);border-color:#E24B4A;color:#E24B4A;}
.beat-cell.good{background:rgba(29,158,117,.35);border-color:#1D9E75;color:#1D9E75;}
.beat-cell.beat-marker{border-color:#2a2a3a;}
.beat-cell.beat-4{border-top:1px solid #2a2a3a;}
.beat-num{position:absolute;left:3px;top:1px;font-size:8px;color:#2a2a2a;pointer-events:none;}
</style>
</head>

</div>

// 현재 편집 중인 곡 인덱스
let currentSongIdx = -1;

let totalBeats = 64;
let currentTool = 'bad';
let pattern = {}; // key: "beat_lane" → 'bad'|'good'
let isDragging = false;

function extractYtId(url) {
  const src = url.match(/src="([^"]+)"/);
  const u = src ? src[1] : url;
  const m = u.match(/(?:v=|youtu\.be\/|embed\/)([a-zA-Z0-9_-]{11})/);
  return m ? m[1] : null;
}

function loadYT() {
  const url = document.getElementById('yt-url').value.trim();
  const id = extractYtId(url);
  if (!id) { alert('유효한 유튜브 URL이 아닙니다'); return; }
  document.getElementById('song-ytid').value = id;
  const area = document.getElementById('yt-area');
  area.innerHTML = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1&controls=1&rel=0&modestbranding=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
}

function populateSongSelect() {
  const sel = document.getElementById('song-select');
  sel.innerHTML = '<option value="">— 새 곡 만들기 —</option>';
  SONGS.forEach((song, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = `${song.title} (${song.bpm} BPM)`;
    sel.appendChild(opt);
  });
}

function loadExistingSong(idx) {
  if (idx === '') { currentSongIdx = -1; return; }
  currentSongIdx = parseInt(idx);
  const song = SONGS[currentSongIdx];

  // 곡 정보 채우기
  document.getElementById('song-title').value = song.title;
  document.getElementById('song-ytid').value = song.ytId;
  document.getElementById('song-bpm').value = song.bpm;
  document.getElementById('song-beats').value = song.totalBeats;
  document.getElementById('song-color').value = song.color;
  document.getElementById('yt-url').value = `https://youtu.be/${song.ytId}`;

  // 유튜브 로드
  const area = document.getElementById('yt-area');
  area.innerHTML = `<iframe src="https://www.youtube.com/embed/${song.ytId}?autoplay=1&controls=1&rel=0&modestbranding=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;

  // 패턴 로드
  totalBeats = song.totalBeats;
  pattern = {};
  for (let b = 0; b < song.totalBeats; b++) {
    const items = song.pattern(b, 'normal');
    items.forEach(item => {
      pattern[`${b}_${item.lane}`] = item.type;
    });
  }
  renderGrid();
}

function initGrid() {
  totalBeats = parseInt(document.getElementById('song-beats').value) || 64;
  pattern = {};
  renderGrid();
}

function renderGrid() {
  for (let l = 0; l < 3; l++) {
    const lane = document.getElementById(`lane-${l}`);
    // 헤더 유지하고 셀만 제거
    const header = lane.querySelector('.lane-header');
    lane.innerHTML = '';
    lane.appendChild(header);

    for (let b = 0; b < totalBeats; b++) {
      const cell = document.createElement('div');
      cell.className = 'beat-cell';
      if ((b+1) % 4 === 1) cell.classList.add('beat-4');

      const num = document.createElement('span');
      num.className = 'beat-num';
      num.textContent = (b+1) % 4 === 1 ? b+1 : '';
      cell.appendChild(num);

      const key = `${b}_${l}`;
      if (pattern[key]) {
        cell.classList.add(pattern[key]);
        cell.appendChild(document.createTextNode(pattern[key]==='bad'?'★':'●'));
      }

      cell.addEventListener('mousedown', e => { isDragging=true; applyTool(b,l,cell); e.preventDefault(); });
      cell.addEventListener('mouseenter', () => { if(isDragging) applyTool(b,l,cell); });
      cell.addEventListener('touchstart', e => { isDragging=true; applyTool(b,l,cell); e.preventDefault(); }, {passive:false});
      lane.appendChild(cell);
    }
  }
}

function applyTool(b, l, cell) {
  const key = `${b}_${l}`;
  // 현재 상태
  const cur = pattern[key];

  // 같은 거 클릭 → 제거
  if (cur === currentTool) {
    delete pattern[key];
  } else if (currentTool === 'erase') {
    delete pattern[key];
  } else {
    // GOOD 배치 시 같은 비트 다른 레인 BAD 제거
    if (currentTool === 'good') {
      for (let ol = 0; ol < 3; ol++) {
        if (ol !== l) {
          const ok = `${b}_${ol}`;
          if (pattern[ok] === 'bad') {
            delete pattern[ok];
          }
        }
      }
    }
    pattern[key] = currentTool;
  }
  // 전체 리렌더 (해당 비트 행만)
  refreshBeat(b);
}

function refreshBeat(b) {
  for (let l = 0; l < 3; l++) {
    const lane = document.getElementById(`lane-${l}`);
    // 헤더 다음 b번째 셀
    const cells = lane.querySelectorAll('.beat-cell');
    const cell = cells[b];
    if (!cell) continue;

    const key = `${b}_${l}`;
    cell.classList.remove('bad','good');
    // 텍스트 노드 제거
    cell.childNodes.forEach(n => { if(n.nodeType===3) n.remove(); });

    if (pattern[key]) {
      cell.classList.add(pattern[key]);
      cell.appendChild(document.createTextNode(pattern[key]==='bad'?'★':'●'));
    }
  }
}

function setTool(tool) {
  currentTool = tool;
  ['bad','good','erase'].forEach(t => {
    const btn = document.getElementById(`tool-${t}`);
    btn.className = 'tool-btn';
    if (t === tool) btn.classList.add(`active-${t}`);
  });
}

function clearAll() {
  if (!confirm('전체 패턴을 지울까요?')) return;
  pattern = {};
  renderGrid();
}

function generateCode() {
  const title = document.getElementById('song-title').value || '새 곡';
  const ytId = document.getElementById('song-ytid').value || 'YTID';
  const bpm = parseInt(document.getElementById('song-bpm').value) || 120;
  const beats = totalBeats;
  const color = document.getElementById('song-color').value;

  const lines = [];
  for (let b = 0; b < beats; b++) {
    const items = [];
    for (let l = 0; l < 3; l++) {
      const k = `${b}_${l}`;
      if (pattern[k]) items.push(`{lane:${l},type:'${pattern[k]}'}`);
    }
    if (items.length > 0) {
      lines.push(`      if(b===${b}) r.push(${items.join(',')});`);
    }
  }

  const code = `  {
    title: '${title}',
    ytId: '${ytId}',
    bpm: ${bpm},
    color: '${color}',
    totalBeats: ${beats},
    pattern(b, diff) {
      const r = [];
${lines.join('\n') || '      // 패턴 없음'}
      return r;
    }
  },`;

  const el = document.getElementById('output-code');
  el.textContent = code;
  el.style.display = 'block';
  document.getElementById('copy-btn').style.display = 'block';
}

function copyCode() {
  navigator.clipboard.writeText(document.getElementById('output-code').textContent).then(() => {
    const msg = document.getElementById('copy-msg');
    msg.textContent = '✓ 복사됐어요! beat-dodge.html의 SONGS 배열에 붙여넣으세요.';
    setTimeout(() => msg.textContent='', 3000);
  });
}

document.addEventListener('mouseup', () => isDragging=false);
document.addEventListener('touchend', () => isDragging=false);

// 초기화
populateSongSelect();
initGrid();
</script>
</body>
</html>
