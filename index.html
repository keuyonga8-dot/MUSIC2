<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beat Dodge — 패턴 에디터 v3</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0a0a0f;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden;}
#wrap{display:flex;height:100vh;}

/* ── 왼쪽 패널 ── */
#panel{width:260px;flex:0 0 260px;background:#0d0d18;border-right:1px solid #1a1a2e;display:flex;flex-direction:column;overflow-y:auto;}
#panel-header{padding:10px 14px;border-bottom:1px solid #1a1a2e;}
#panel-header h1{font-size:13px;font-weight:600;color:#AFA9EC;margin-bottom:1px;}
#panel-header p{font-size:10px;color:#444;}
.section{padding:10px 14px;border-bottom:1px solid #1a1a2e;}
.section-title{font-size:10px;color:#555;margin-bottom:7px;letter-spacing:.05em;text-transform:uppercase;}
.field{display:flex;flex-direction:column;gap:3px;margin-bottom:7px;}
.field label{font-size:10px;color:#666;}
.inp{font-size:12px;padding:5px 8px;background:#111;border:1px solid #222;border-radius:6px;color:#fff;outline:none;width:100%;}
.inp:focus{border-color:#534AB7;}
.row{display:flex;gap:5px;}
.btn{font-size:11px;padding:6px 10px;border:none;border-radius:6px;cursor:pointer;font-weight:500;width:100%;margin-bottom:4px;}
.btn-primary{background:#534AB7;color:#fff;}
.btn-green{background:#1D9E75;color:#fff;}
.btn-gray{background:#1a1a2e;color:#888;border:1px solid #2a2a3a;}
.btn-red{background:rgba(226,75,74,.15);color:#E24B4A;border:1px solid rgba(226,75,74,.4);}
.btn-orange{background:rgba(251,146,60,.15);color:#FB923C;border:1px solid rgba(251,146,60,.4);}

/* 도구 버튼 */
.tool-btn{flex:1;padding:6px;font-size:11px;font-weight:600;border-radius:6px;cursor:pointer;text-align:center;border:1px solid #2a2a3a;background:#111;color:#555;}
.tool-btn.active-bad{border-color:#E24B4A;background:rgba(226,75,74,.2);color:#E24B4A;}
.tool-btn.active-good{border-color:#1D9E75;background:rgba(29,158,117,.2);color:#1D9E75;}
.tool-btn.active-erase{border-color:#888;background:rgba(255,255,255,.07);color:#ccc;}

/* 시뮬 파라미터 */
.sim-row{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.sim-row label{font-size:10px;color:#666;flex:0 0 60px;}
.sim-row input[type=range]{flex:1;accent-color:#534AB7;}
.sim-row span{font-size:10px;color:#AFA9EC;flex:0 0 28px;text-align:right;}

/* 출력 코드 */
#output-code{font-family:monospace;font-size:9px;color:#AFA9EC;background:#080810;padding:7px;border-radius:6px;white-space:pre;overflow:auto;max-height:150px;border:1px solid #1a1a2e;margin-bottom:5px;}

/* ── 오른쪽 메인 ── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}

/* 유튜브 */
#yt-area{background:#000;flex:0 0 160px;}
#yt-area iframe{width:100%;height:160px;border:none;display:block;}
#yt-placeholder{height:160px;display:flex;align-items:center;justify-content:center;color:#2a2a3a;font-size:12px;}

/* 탭 */
#tab-bar{display:flex;background:#0d0d18;border-bottom:1px solid #1a1a2e;flex:0 0 auto;}
.tab{padding:7px 16px;font-size:11px;font-weight:500;color:#555;cursor:pointer;border-bottom:2px solid transparent;}
.tab.active{color:#AFA9EC;border-bottom-color:#534AB7;}
.tab-badge{display:inline-block;font-size:9px;padding:1px 5px;border-radius:8px;margin-left:4px;background:#1a1a2e;color:#666;}
.tab.active .tab-badge{background:#2a2a4a;color:#AFA9EC;}

/* ── 에디터 뷰 ── */
#editor-view{flex:1;display:flex;overflow:hidden;}
#lanes-wrap{display:flex;flex:1;gap:0;overflow:hidden;}

/* 공통 레인 컨테이너 */
.lanes-col{flex:1;display:flex;flex-direction:column;overflow:hidden;border-right:1px solid #0d0d18;}
.lanes-col:last-child{border-right:none;}
.col-header{text-align:center;font-size:10px;font-weight:600;padding:5px 4px;background:#0d0d18;border-bottom:1px solid #1a1a2e;flex:0 0 auto;color:#555;}
.col-header.manual-h{color:#AFA9EC;}
.col-header.sim-h{color:#F59E0B;}

/* 레인 그리드 */
.lane-grid{flex:1;display:flex;gap:1px;padding:4px;overflow-y:auto;background:#0a0a0f;}
.lane-grid::-webkit-scrollbar{width:4px;}
.lane-grid::-webkit-scrollbar-thumb{background:#1a1a2e;border-radius:2px;}
.lane{flex:1;display:flex;flex-direction:column;gap:1px;}
.lane-hdr{text-align:center;font-size:9px;color:#333;padding:3px 2px;background:#111;border-radius:3px;margin-bottom:2px;position:sticky;top:0;z-index:5;}

/* 셀 */
.beat-cell{width:100%;height:22px;border-radius:3px;background:#111;border:1px solid #1a1a2e;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px;color:#2a2a2a;position:relative;flex:0 0 auto;transition:background .06s;}
.beat-cell:hover{background:#1a1a2e;}
.beat-cell.bad{background:rgba(226,75,74,.3);border-color:#E24B4A;color:#E24B4A;}
.beat-cell.good{background:rgba(29,158,117,.3);border-color:#1D9E75;color:#1D9E75;}
.beat-cell.beat-4{border-top-color:#2a2a3a;}
.beat-num{position:absolute;left:2px;top:0px;font-size:7px;color:#2a2a2a;pointer-events:none;line-height:1;}

/* 시뮬 전용 셀 (읽기전용) */
.beat-cell.sim-cell{cursor:default;}
.beat-cell.sim-cell:hover{background:#111;}
.beat-cell.sim-cell.bad:hover{background:rgba(226,75,74,.3);}
.beat-cell.sim-cell.good:hover{background:rgba(29,158,117,.3);}

/* 구분선 */
.divider{width:6px;flex:0 0 6px;background:#0d0d18;display:flex;align-items:center;justify-content:center;}
.divider-icon{font-size:8px;color:#2a2a3a;writing-mode:vertical-rl;}

/* ── 시뮬 뷰 (탭 전환) ── */
#sim-view{flex:1;overflow:hidden;display:none;}

/* 스크롤 동기화 표시 */
#scroll-sync-badge{font-size:9px;color:#534AB7;padding:2px 6px;background:#0d0d18;border-bottom:1px solid #1a1a2e;text-align:center;flex:0 0 auto;}

/* diff 선택 */
.diff-tabs{display:flex;gap:4px;margin-bottom:7px;}
.diff-tab{flex:1;padding:4px;font-size:10px;font-weight:500;border-radius:5px;border:1px solid #222;background:#111;color:#555;cursor:pointer;text-align:center;}
.diff-tab.active-easy{border-color:#1D9E75;background:rgba(29,158,117,.15);color:#1D9E75;}
.diff-tab.active-normal{border-color:#534AB7;background:rgba(83,74,183,.15);color:#AFA9EC;}
.diff-tab.active-hard{border-color:#E24B4A;background:rgba(226,75,74,.15);color:#E24B4A;}

/* 통계 */
.stat-row{display:flex;justify-content:space-between;font-size:10px;color:#555;margin-bottom:3px;}
.stat-row span{color:#AFA9EC;}
</style>
</head>
<body>
<div id="wrap">

<!-- ── 왼쪽 패널 ── -->
<div id="panel">
  <div id="panel-header">
    <h1>🎵 패턴 에디터 v3</h1>
    <p>수동 배치 + 시뮬레이션 동시 비교</p>
  </div>

  <div class="section">
    <div class="section-title">곡 선택</div>
    <select id="song-select" class="inp" onchange="loadExistingSong(this.value)" style="margin-bottom:5px;">
      <option value="">— 새 곡 만들기 —</option>
    </select>
  </div>

  <div class="section">
    <div class="section-title">유튜브</div>
    <div class="field">
      <label>URL</label>
      <input id="yt-url" class="inp" placeholder="https://youtu.be/..."/>
    </div>
    <button class="btn btn-primary" onclick="loadYT()">▶ 재생</button>
  </div>

  <div class="section">
    <div class="section-title">곡 정보</div>
    <div class="field"><label>제목</label><input id="song-title" class="inp" placeholder="곡 제목"/></div>
    <div class="field"><label>ytId</label><input id="song-ytid" class="inp" placeholder="자동입력"/></div>
    <div class="row">
      <div class="field" style="flex:1"><label>BPM</label><input id="song-bpm" class="inp" type="number" value="120" oninput="onParamChange()"/></div>
      <div class="field" style="flex:1"><label>총 비트</label><input id="song-beats" class="inp" type="number" value="64" oninput="onParamChange()"/></div>
    </div>
    <div class="field"><label>색상</label><input id="song-color" class="inp" type="color" value="#534AB7"/></div>
    <button class="btn btn-gray" onclick="initGrid()">그리드 초기화</button>
  </div>

  <div class="section">
    <div class="section-title">도구 (수동 배치)</div>
    <div class="row" style="margin-bottom:7px;">
      <div class="tool-btn active-bad" id="tool-bad" onclick="setTool('bad')">★ BAD</div>
      <div class="tool-btn" id="tool-good" onclick="setTool('good')">● GOOD</div>
      <div class="tool-btn" id="tool-erase" onclick="setTool('erase')">지우기</div>
    </div>
    <div style="font-size:10px;color:#444;line-height:1.6;">클릭/드래그로 배치 · 재클릭 제거</div>
  </div>

  <div class="section">
    <div class="section-title">시뮬레이션 파라미터</div>
    <div class="diff-tabs">
      <div class="diff-tab active-easy" id="dtab-easy" onclick="setSimDiff('easy')">이지</div>
      <div class="diff-tab" id="dtab-normal" onclick="setSimDiff('normal')">노멀</div>
      <div class="diff-tab" id="dtab-hard" onclick="setSimDiff('hard')">하드</div>
    </div>
    <div class="sim-row">
      <label>쿨다운</label>
      <input type="range" id="sim-cd" min="1" max="20" value="10" oninput="onSimChange()"/>
      <span id="sim-cd-val">10</span>
    </div>
    <div class="sim-row">
      <label>GOOD 주기</label>
      <input type="range" id="sim-gp" min="4" max="32" value="16" oninput="onSimChange()"/>
      <span id="sim-gp-val">16</span>
    </div>
    <div class="sim-row">
      <label>GOOD 오프셋</label>
      <input type="range" id="sim-go" min="0" max="31" value="13" oninput="onSimChange()"/>
      <span id="sim-go-val">13</span>
    </div>
    <div id="sim-stats" style="margin-top:6px;padding-top:6px;border-top:1px solid #1a1a2e;">
      <div class="stat-row">BAD 총 개수 <span id="st-bad">—</span></div>
      <div class="stat-row">GOOD 총 개수 <span id="st-good">—</span></div>
      <div class="stat-row">평균 간격 <span id="st-avg">—</span>비트</div>
    </div>
    <button class="btn btn-orange" onclick="applySimToManual()" style="margin-top:6px;">↙ 시뮬 결과를 수동에 복사</button>
  </div>

  <div class="section">
    <div class="section-title">내보내기</div>
    <div class="diff-tabs" style="margin-bottom:6px;">
      <div class="diff-tab active-easy" id="etab-manual" onclick="setExportSrc('manual')">수동</div>
      <div class="diff-tab" id="etab-sim" onclick="setExportSrc('sim')">시뮬</div>
    </div>
    <button class="btn btn-green" onclick="generateCode()">코드 생성</button>
    <div id="output-code" style="display:none;margin-top:6px;"></div>
    <button class="btn btn-primary" id="copy-btn" style="display:none;margin-top:4px;" onclick="copyCode()">복사</button>
    <div id="copy-msg" style="font-size:10px;color:#1D9E75;margin-top:3px;"></div>
  </div>

  <div class="section">
    <button class="btn btn-red" onclick="clearAll()">전체 초기화</button>
  </div>
</div>

<!-- ── 오른쪽 메인 ── -->
<div id="main">
  <div id="yt-area">
    <div id="yt-placeholder">← 유튜브 URL을 입력하세요</div>
  </div>

  <div id="tab-bar">
    <div class="tab active" id="tab-both" onclick="switchTab('both')">나란히 보기 <span class="tab-badge">추천</span></div>
    <div class="tab" id="tab-manual" onclick="switchTab('manual')">수동 배치만</div>
    <div class="tab" id="tab-sim" onclick="switchTab('sim')">시뮬레이션만</div>
  </div>
  <div id="scroll-sync-badge">↕ 스크롤 동기화 중</div>

  <div id="editor-view">
    <div id="lanes-wrap">
      <!-- 수동 배치 -->
      <div class="lanes-col" id="col-manual">
        <div class="col-header manual-h">✏️ 수동 배치</div>
        <div class="lane-grid" id="manual-grid">
          <div class="lane" id="m-lane-0"><div class="lane-hdr">← L0</div></div>
          <div class="lane" id="m-lane-1"><div class="lane-hdr">L1</div></div>
          <div class="lane" id="m-lane-2"><div class="lane-hdr">R2 →</div></div>
        </div>
      </div>

      <div class="divider"><div class="divider-icon">vs</div></div>

      <!-- 시뮬레이션 -->
      <div class="lanes-col" id="col-sim">
        <div class="col-header sim-h">🎮 시뮬레이션 (실제 게임)</div>
        <div class="lane-grid" id="sim-grid">
          <div class="lane" id="s-lane-0"><div class="lane-hdr">← L0</div></div>
          <div class="lane" id="s-lane-1"><div class="lane-hdr">L1</div></div>
          <div class="lane" id="s-lane-2"><div class="lane-hdr">R2 →</div></div>
        </div>
      </div>
    </div>
  </div>
</div>
</div>

<script>
// ── v6.2 동기화 ────────────────────────────────────────────
let laneLastBeat = [0,0,0];
let _spawnRR = 0;
function pickLane(ready, b) {
  const oldest = ready.reduce((a,l) => laneLastBeat[l] < laneLastBeat[a] ? l : a);
  const tied = ready.filter(l => laneLastBeat[l] === laneLastBeat[oldest]);
  if (tied.length > 1) { _spawnRR++; return tied[_spawnRR % tied.length]; }
  return oldest;
}
function resetLane() { laneLastBeat=[0,0,0]; _spawnRR=0; }

// ── SONGS ──────────────────────────────────────────────────
const SONGS = [
  { title:'Hugo 번외곡 | Melting down', ytId:'p4spKijRcAw', beatsPerDiff:{easy:396,normal:595,hard:992}, bpm:96, color:'#F4A0A0', totalBeats:992,
    pattern(b,diff){const r=[],w=[0,1,2,1,0,2,0,1,2,0,2,1,2,0,1,0,2,1,1,0,2,1,2,0];const cd=diff==='easy'?10:diff==='hard'?3:6;const goodBeat=diff==='hard'?(b%8===5):(b%16===13);if(goodBeat){r.push({lane:w[b%24],type:'good'});laneLastBeat[w[b%24]]=b;}else{const ready=[0,1,2].filter(l=>b-laneLastBeat[l]>=cd);if(ready.length>0){const lane=pickLane(ready,b);r.push({lane,type:'bad'});laneLastBeat[lane]=b;}}return r;}},

    pattern(b,diff){const r=[],w=[0,2,1,0,2,1,2,0,1,0,1,2,1,2,0,2,0,1,1,0,2,1,0,2];const cd=diff==='easy'?10:diff==='hard'?3:6;const goodBeat=diff==='hard'?(b%7===4):(b%14===11);if(goodBeat){r.push({lane:w[b%24],type:'good'});laneLastBeat[w[b%24]]=b;}else{const ready=[0,1,2].filter(l=>b-laneLastBeat[l]>=cd);if(ready.length>0){const lane=pickLane(ready,b);r.push({lane,type:'bad'});laneLastBeat[lane]=b;}}return r;}},
  { title:'Liam 번외곡 | Word', ytId:'KvWs7PzYgwY', beatsPerDiff:{easy:468,normal:702,hard:1170}, bpm:118, color:'#E2E8F0', totalBeats:1170,
    pattern(b,diff){const r=[],w=[0,1,2,0,2,1,2,0,1,2,1,0,1,2,0,1,0,2,0,2,1,0,1,2];const cd=diff==='easy'?10:diff==='hard'?3:6;const goodBeat=diff==='hard'?(b%6===3):(b%12===9);if(goodBeat){r.push({lane:w[b%24],type:'good'});laneLastBeat[w[b%24]]=b;}else{const ready=[0,1,2].filter(l=>b-laneLastBeat[l]>=cd);if(ready.length>0){const lane=pickLane(ready,b);r.push({lane,type:'bad'});laneLastBeat[lane]=b;}}return r;}},
  { title:'Ash 번외곡 | 가까이 오지 말라고 말했잖아!', ytId:'umx2NvAX1qY', beatsPerDiff:{easy:452,normal:678,hard:1130}, bpm:135, color:'#DC2626', totalBeats:1130, hardBpmMult:2.0,
    pattern(b,diff){const r=[],w=[0,2,1,0,2,0,1,2,0,1,2,1,0,2,1,0,2,1,0,1,2,0,2,1];const cd=diff==='easy'?10:diff==='hard'?3:6;const goodBeat=diff==='hard'?(b%5===3):(b%10===8);if(goodBeat){r.push({lane:w[b%24],type:'good'});laneLastBeat[w[b%24]]=b;}else{const ready=[0,1,2].filter(l=>b-laneLastBeat[l]>=cd);if(ready.length>0){const lane=pickLane(ready,b);r.push({lane,type:'bad'});laneLastBeat[lane]=b;}}return r;}},

    pattern(b,diff){const r=[],w=[0,1,2,0,1,2,1,0,2,1,2,0,0,2,1,0,2,1,2,0,1,2,1,0];const cd=diff==='easy'?10:diff==='hard'?3:6;const goodBeat=diff==='hard'?(b%6===4):(b%13===10);if(goodBeat){r.push({lane:w[b%24],type:'good'});laneLastBeat[w[b%24]]=b;}else{const ready=[0,1,2].filter(l=>b-laneLastBeat[l]>=cd);if(ready.length>0){const lane=pickLane(ready,b);r.push({lane,type:'bad'});laneLastBeat[lane]=b;}}return r;}},

    pattern(b,diff){const r=[],w=[2,0,1,2,0,2,1,0,2,0,1,2,1,2,0,1,0,2,0,1,2,1,0,2];const cd=diff==='easy'?10:diff==='hard'?3:6;const goodBeat=diff==='hard'?(b%6===3):(b%12===9);if(goodBeat){r.push({lane:w[b%24],type:'good'});laneLastBeat[w[b%24]]=b;}else{const ready=[0,1,2].filter(l=>b-laneLastBeat[l]>=cd);if(ready.length>0){const lane=pickLane(ready,b);r.push({lane,type:'bad'});laneLastBeat[lane]=b;}}return r;}},

    pattern(b,diff){const r=[],w=[1,0,2,1,2,0,0,1,2,0,2,1,2,1,0,2,0,1,1,2,0,1,0,2];const cd=diff==='easy'?10:diff==='hard'?3:6;const goodBeat=diff==='hard'?(b%7===4):(b%14===11);if(goodBeat){r.push({lane:w[b%24],type:'good'});laneLastBeat[w[b%24]]=b;}else{const ready=[0,1,2].filter(l=>b-laneLastBeat[l]>=cd);if(ready.length>0){const lane=pickLane(ready,b);r.push({lane,type:'bad'});laneLastBeat[lane]=b;}}return r;}},
  { title:'Amore 번외곡 | ROSA NERA', ytId:'HYcXDO0U1zY', beatsPerDiff:{easy:513,normal:769,hard:1283}, bpm:118, color:'#84A840', totalBeats:1283,

// ── 상태 ──────────────────────────────────────────────────
let totalBeats = 64;
let currentTool = 'bad';
let manualPattern = {}; // key: "b_l" → 'bad'|'good'
let simPattern = {};    // 시뮬레이션 결과
let isDragging = false;
let simDiff = 'easy';
let exportSrc = 'manual';
let currentTab = 'both';

// 시뮬 파라미터
function simCd()  { return parseInt(document.getElementById('sim-cd').value); }
function simGP()  { return parseInt(document.getElementById('sim-gp').value); }
function simGO()  { return parseInt(document.getElementById('sim-go').value); }

// ── 시뮬레이션 실행 ────────────────────────────────────────
const W_ARR = [0,1,2,1,0,2,0,1,2,0,2,1,2,0,1,0,2,1,1,0,2,1,2,0];
function runSimulation() {
  simPattern = {};
  resetLane();
  const cd = simCd(), gp = simGP(), go = simGO();
  let badCount=0, goodCount=0, intervals=[], lastBad=-99;

  for (let b = 0; b < totalBeats; b++) {
    const isGood = (b % gp === go % gp);
    if (isGood) {
      const lane = W_ARR[b % 24];
      simPattern[`${b}_${lane}`] = 'good';
      laneLastBeat[lane] = b;
      goodCount++;
    } else {
      const ready = [0,1,2].filter(l => b - laneLastBeat[l] >= cd);
      if (ready.length > 0) {
        const lane = pickLane(ready, b);
        simPattern[`${b}_${lane}`] = 'bad';
        laneLastBeat[lane] = b;
        if (lastBad >= 0) intervals.push(b - lastBad);
        lastBad = b;
        badCount++;
      }
    }
  }

  // 통계 업데이트
  document.getElementById('st-bad').textContent = badCount;
  document.getElementById('st-good').textContent = goodCount;
  const avg = intervals.length > 0 ? (intervals.reduce((a,v)=>a+v,0)/intervals.length).toFixed(1) : '—';
  document.getElementById('st-avg').textContent = avg;

  renderSimGrid();
}

// ── 그리드 렌더 ────────────────────────────────────────────
function buildCell(b, l, isManual) {
  const cell = document.createElement('div');
  cell.className = 'beat-cell' + (isManual ? '' : ' sim-cell');
  if ((b+1) % 4 === 1) cell.classList.add('beat-4');

  const num = document.createElement('span');
  num.className = 'beat-num';
  num.textContent = (b+1) % 4 === 1 ? b+1 : '';
  cell.appendChild(num);

  const key = `${b}_${l}`;
  const pat = isManual ? manualPattern : simPattern;
  if (pat[key]) {
    cell.classList.add(pat[key]);
    cell.appendChild(document.createTextNode(pat[key]==='bad'?'★':'●'));
  }

  if (isManual) {
    cell.addEventListener('mousedown', e => { isDragging=true; applyTool(b,l); e.preventDefault(); });
    cell.addEventListener('mouseenter', () => { if(isDragging) applyTool(b,l); });
    cell.addEventListener('touchstart', e => { isDragging=true; applyTool(b,l); e.preventDefault(); }, {passive:false});
  }
  return cell;
}

function renderManualGrid() {
  for (let l = 0; l < 3; l++) {
    const lane = document.getElementById(`m-lane-${l}`);
    const hdr = lane.querySelector('.lane-hdr');
    lane.innerHTML = ''; lane.appendChild(hdr);
    for (let b = totalBeats-1; b >= 0; b--) lane.appendChild(buildCell(b, l, true));
  }
}

function renderSimGrid() {
  for (let l = 0; l < 3; l++) {
    const lane = document.getElementById(`s-lane-${l}`);
    const hdr = lane.querySelector('.lane-hdr');
    lane.innerHTML = ''; lane.appendChild(hdr);
    for (let b = totalBeats-1; b >= 0; b--) lane.appendChild(buildCell(b, l, false));
  }
}

function refreshManualBeat(b) {
  for (let l = 0; l < 3; l++) {
    const lane = document.getElementById(`m-lane-${l}`);
    const cells = lane.querySelectorAll('.beat-cell');
    const cell = cells[totalBeats-1-b];
    if (!cell) continue;
    const key = `${b}_${l}`;
    cell.classList.remove('bad','good');
    cell.childNodes.forEach(n => { if(n.nodeType===3) n.remove(); });
    if (manualPattern[key]) {
      cell.classList.add(manualPattern[key]);
      cell.appendChild(document.createTextNode(manualPattern[key]==='bad'?'★':'●'));
    }
  }
}

// ── 도구 적용 ──────────────────────────────────────────────
function applyTool(b, l) {
  const key = `${b}_${l}`;
  const cur = manualPattern[key];
  if (cur === currentTool || currentTool === 'erase') {
    delete manualPattern[key];
  } else {
    if (currentTool === 'good') {
      for (let ol=0; ol<3; ol++) {
        if (ol!==l && manualPattern[`${b}_${ol}`]==='bad') delete manualPattern[`${b}_${ol}`];
      }
    }
    manualPattern[key] = currentTool;
  }
  refreshManualBeat(b);
}

// ── 시뮬 결과를 수동으로 복사 ─────────────────────────────
function applySimToManual() {
  if (!confirm('시뮬레이션 결과를 수동 배치에 덮어쓸까요?')) return;
  manualPattern = {...simPattern};
  renderManualGrid();
}

// ── 파라미터 변경 콜백 ─────────────────────────────────────
function onParamChange() {
  totalBeats = parseInt(document.getElementById('song-beats').value) || 64;
  runSimulation();
}
function onSimChange() {
  document.getElementById('sim-cd-val').textContent = simCd();
  document.getElementById('sim-gp-val').textContent = simGP();
  document.getElementById('sim-go-val').textContent = simGO();
  runSimulation();
}

// ── UI 유틸 ───────────────────────────────────────────────
function setTool(tool) {
  currentTool = tool;
  ['bad','good','erase'].forEach(t => {
    const btn = document.getElementById(`tool-${t}`);
    btn.className = 'tool-btn';
    if (t === tool) btn.classList.add(`active-${t}`);
  });
}

function setSimDiff(d) {
  simDiff = d;
  ['easy','normal','hard'].forEach(t => {
    const btn = document.getElementById(`dtab-${t}`);
    btn.className = 'diff-tab' + (t===d ? ` active-${t}` : '');
  });
  // 선택된 곡이 있으면 해당 곡 패턴으로 시뮬 파라미터 자동 업데이트
  const idx = parseInt(document.getElementById('song-select').value);
  if (!isNaN(idx) && SONGS[idx]) {
    loadSimParamsFromSong(SONGS[idx], d);
  }
  runSimulation();
}

function setExportSrc(src) {
  exportSrc = src;
  ['manual','sim'].forEach(t => {
    const btn = document.getElementById(`etab-${t}`);
    btn.className = 'diff-tab' + (t===src ? ' active-easy' : '');
  });
}

function switchTab(tab) {
  currentTab = tab;
  ['both','manual','sim'].forEach(t => {
    document.getElementById(`tab-${t}`).classList.toggle('active', t===tab);
  });
  const colM = document.getElementById('col-manual');
  const div  = document.querySelector('.divider');
  const colS = document.getElementById('col-sim');
  colM.style.display = tab==='sim'  ? 'none' : '';
  colS.style.display = tab==='manual'? 'none' : '';
  div.style.display  = tab==='both' ? '' : 'none';
}

// ── 곡 선택 → 시뮬 파라미터 자동 추출 ────────────────────
function loadSimParamsFromSong(song, diff) {
  // 실제 패턴 함수를 작은 범위로 실행해서 cd/gp/go 역산
  resetLane();
  const testBeats = Math.min(song.totalBeats, 200);
  let firstCd = 6, firstGP = 13, firstGO = 0;

  // goodBeat 주기 찾기
  const goods = [];
  resetLane();
  for (let b = 0; b < testBeats; b++) {
    const items = song.pattern(b, diff);
    items.filter(i=>i.type==='good').forEach(()=>goods.push(b));
  }
  if (goods.length >= 2) {
    const gaps = [];
    for (let i=1;i<Math.min(goods.length,5);i++) gaps.push(goods[i]-goods[i-1]);
    firstGP = Math.round(gaps.reduce((a,v)=>a+v,0)/gaps.length) || 13;
    firstGO = goods[0] % firstGP;
  }

  // bad 쿨다운 추정
  const bads = [];
  resetLane();
  for (let b = 0; b < testBeats; b++) {
    const items = song.pattern(b, diff);
    items.filter(i=>i.type==='bad').forEach(i=>bads.push(b));
  }
  if (bads.length >= 2) {
    const gaps = [];
    for (let i=1;i<Math.min(bads.length,10);i++) gaps.push(bads[i]-bads[i-1]);
    firstCd = Math.max(1, Math.round(gaps.reduce((a,v)=>a+v,0)/gaps.length * 0.8));
  }

  document.getElementById('sim-cd').value = Math.min(20, Math.max(1, firstCd));
  document.getElementById('sim-gp').value = Math.min(32, Math.max(4, firstGP));
  document.getElementById('sim-go').value = Math.min(31, Math.max(0, firstGO));
  document.getElementById('sim-cd-val').textContent = document.getElementById('sim-cd').value;
  document.getElementById('sim-gp-val').textContent = document.getElementById('sim-gp').value;
  document.getElementById('sim-go-val').textContent = document.getElementById('sim-go').value;
}

// ── 곡 로드 ───────────────────────────────────────────────
function loadExistingSong(idx) {
  if (idx === '') return;
  const song = SONGS[parseInt(idx)];
  document.getElementById('song-title').value = song.title;
  document.getElementById('song-ytid').value = song.ytId;
  document.getElementById('song-bpm').value = song.bpm;
  const previewBeats = song.beatsPerDiff ? song.beatsPerDiff.normal : song.totalBeats;
  document.getElementById('song-beats').value = previewBeats;
  document.getElementById('song-color').value = song.color;
  document.getElementById('yt-url').value = `https://youtu.be/${song.ytId}`;
  document.getElementById('yt-area').innerHTML =
    `<iframe src="https://www.youtube.com/embed/${song.ytId}?autoplay=1&controls=1&rel=0&modestbranding=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;

  totalBeats = previewBeats;
  manualPattern = {};
  resetLane();
  for (let b = 0; b < previewBeats; b++) {
    const items = song.pattern(b, 'normal');
    items.forEach(item => { manualPattern[`${b}_${item.lane}`] = item.type; });
  }

  loadSimParamsFromSong(song, simDiff);
  renderManualGrid();
  runSimulation();

  setTimeout(() => {
    document.getElementById('manual-grid').scrollTop = 99999;
    document.getElementById('sim-grid').scrollTop = 99999;
  }, 60);
}

function initGrid() {
  totalBeats = parseInt(document.getElementById('song-beats').value) || 64;
  manualPattern = {};
  renderManualGrid();
  runSimulation();
  setTimeout(() => {
    document.getElementById('manual-grid').scrollTop = 99999;
    document.getElementById('sim-grid').scrollTop = 99999;
  }, 60);
}

function clearAll() {
  if (!confirm('전체 패턴을 지울까요?')) return;
  manualPattern = {};
  renderManualGrid();
}

// ── 스크롤 동기화 ─────────────────────────────────────────
let syncLock = false;
function syncScroll(from, to) {
  if (syncLock) return;
  syncLock = true;
  const pct = from.scrollTop / (from.scrollHeight - from.clientHeight);
  to.scrollTop = pct * (to.scrollHeight - to.clientHeight);
  requestAnimationFrame(() => syncLock = false);
}
document.getElementById('manual-grid').addEventListener('scroll', function() {
  syncScroll(this, document.getElementById('sim-grid'));
});
document.getElementById('sim-grid').addEventListener('scroll', function() {
  syncScroll(this, document.getElementById('manual-grid'));
});

// ── 코드 생성 ─────────────────────────────────────────────
function generateCode() {
  const title = document.getElementById('song-title').value || '새 곡';
  const ytId  = document.getElementById('song-ytid').value || 'YTID';
  const bpm   = parseInt(document.getElementById('song-bpm').value) || 120;
  const beats = totalBeats;
  const color = document.getElementById('song-color').value;
  const src   = exportSrc === 'sim' ? simPattern : manualPattern;

  const beatMap = {};
  for (const key of Object.keys(src)) {
    const [b, l] = key.split('_').map(Number);
    if (!beatMap[b]) beatMap[b] = [];
    beatMap[b].push({lane:l, type:src[key]});
  }

  const lines = [];
  for (const b of Object.keys(beatMap).map(Number).sort((a,z)=>a-z)) {
    const items = beatMap[b].map(i=>`{lane:${i.lane},type:'${i.type}'}`).join(',');
    lines.push(`      if(b===${b}) r.push(${items});`);
  }

  const easyBeats = Math.round(beats*0.6);
  const hardBeats = Math.round(beats*1.67);

  const code =
`  { title: '${title}',
    ytId: '${ytId}',
    beatsPerDiff: {easy:${easyBeats},normal:${beats},hard:${hardBeats}},
    bpm: ${bpm},
    color: '${color}',
    totalBeats: ${beats},
    pattern(b, diff) {
      const r = [];
${lines.join('\n') || '      // 패턴 없음'}
      return r;
    }
  },`;

  const el = document.getElementById('output-code');
  el.textContent = code;
  el.style.display = 'block';
  document.getElementById('copy-btn').style.display = 'block';
}

function copyCode() {
  navigator.clipboard.writeText(document.getElementById('output-code').textContent).then(() => {
    const msg = document.getElementById('copy-msg');
    msg.textContent = '✓ 복사 완료!';
    setTimeout(()=>msg.textContent='', 2500);
  });
}

// ── 유튜브 ────────────────────────────────────────────────
function extractYtId(url) {
  const src = url.match(/src="([^"]+)"/);
  const u = src ? src[1] : url;
  const m = u.match(/(?:v=|youtu\.be\/|embed\/)([a-zA-Z0-9_-]{11})/);
  return m ? m[1] : null;
}
function loadYT() {
  const url = document.getElementById('yt-url').value.trim();
  const id = extractYtId(url);
  if (!id) { alert('유효한 유튜브 URL이 아닙니다'); return; }
  document.getElementById('song-ytid').value = id;
  document.getElementById('yt-area').innerHTML =
    `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1&controls=1&rel=0&modestbranding=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
}

// ── 곡 목록 ───────────────────────────────────────────────
function populateSongSelect() {
  const sel = document.getElementById('song-select');
  sel.innerHTML = '<option value="">— 새 곡 만들기 —</option>';
  SONGS.forEach((s,i) => {
    const o = document.createElement('option');
    o.value = i; o.textContent = `${s.title} (${s.bpm} BPM)`;
    sel.appendChild(o);
  });
}

document.addEventListener('mouseup', ()=>isDragging=false);
document.addEventListener('touchend', ()=>isDragging=false);

populateSongSelect();
initGrid();
</script>
